server {
    listen 3000;

    root /usr/share/nginx/html;
    index index.html;

    # React Router 支持
    location / {
        try_files $uri $uri/ /index.html;
    }

    # 代理 API 请求到 gateway
    location /sessions {
        proxy_pass http://gateway:8000;
        proxy_http_version 1.1;
        # SSE 关键配置
        proxy_set_header Connection "";
        proxy_buffering off;
        proxy_cache off;
        chunked_transfer_encoding on;
    }

    # skill 列表（对话页下拉用）→ gateway
    location /skills {
        proxy_pass http://gateway:8000;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
    }

    # 配置管理 API → admin（LLM / MCP / Skill CRUD）
    location /config {
        proxy_pass http://admin:9000;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
    }

    location /health {
        proxy_pass http://gateway:8000;
    }
}
