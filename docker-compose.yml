version: "3.9"

services:
  mongo:
    image: mongo:7
    restart: unless-stopped
    volumes:
      - mongo_data:/data/db
    networks:
      - pi_net
    healthcheck:
      test: ["CMD", "mongosh", "--eval", "db.adminCommand('ping')"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    volumes:
      - redis_data:/data
    networks:
      - pi_net
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  llm-proxy:
    build:
      context: ./llm-proxy
      dockerfile: Dockerfile
    restart: unless-stopped
    env_file: .env
    environment:
      HOST: "0.0.0.0"
      PORT: "9001"
    ports:
      - "9001:9001"
    volumes:
      - ./logs/llm-proxy:/app/logs
    networks:
      - pi_net
    depends_on:
      mongo:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://127.0.0.1:9001/health"]
      interval: 10s
      timeout: 5s
      retries: 5

  admin:
    build:
      context: ./admin
      dockerfile: Dockerfile
    restart: unless-stopped
    env_file: .env
    environment:
      ADMIN_HOST: "0.0.0.0"
      ADMIN_PORT: "9000"
      SANDBOX_ROOT: "/data/sandboxes"
    ports:
      - "9000:9000"
    volumes:
      # admin 需要写 global skills 到共享文件系统
      - sandbox_workspaces:/data/sandboxes
      - ./logs/admin:/app/logs
    networks:
      - pi_net
    depends_on:
      mongo:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://127.0.0.1:9000/health"]
      interval: 10s
      timeout: 5s
      retries: 5

  gateway:
    build:
      context: ./gateway
      dockerfile: Dockerfile
    restart: unless-stopped
    env_file: .env
    environment:
      GATEWAY_HOST: "0.0.0.0"
      GATEWAY_PORT: "8000"
    ports:
      - "8000:8000"
    volumes:
      - ./logs/gateway:/app/logs
    networks:
      - pi_net
    depends_on:
      mongo:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://127.0.0.1:8000/health"]
      interval: 10s
      timeout: 5s
      retries: 5

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    restart: unless-stopped
    ports:
      - "3000:3000"
    networks:
      - pi_net
    depends_on:
      gateway:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://127.0.0.1:3000"]
      interval: 10s
      timeout: 5s
      retries: 5

  pi-runtime:
    build:
      context: ./pi-runtime
      dockerfile: Dockerfile
    restart: unless-stopped
    env_file: .env
    environment:
      OPENAI_API_KEY: "pi-agent-internal"
      SANDBOX_ROOT: "/data/sandboxes"
      LLM_PROXY_HOST: "llm-proxy"
      LLM_PROXY_PORT: "9001"
      MCP_PROXY_HOST: "mcp-proxy"
      MCP_PROXY_PORT: "8080"
    # bwrap 需要 user namespace，privileged 模式提供必要的内核能力
    privileged: true
    volumes:
      # 共享持久化卷，完整挂载 /data/sandboxes 根目录：
      #   users/{uid}/workspace/  home/  skills/  sessions/ 
      #   global/skills/  ← admin 写入的全局 skill
      - sandbox_workspaces:/data/sandboxes
    networks:
      - pi_net
    depends_on:
      mongo:
        condition: service_healthy
      redis:
        condition: service_healthy
      llm-proxy:
        condition: service_healthy
      mcp-proxy:
        condition: service_healthy

  mcp-proxy:
    build:
      context: ./mcp-proxy
      dockerfile: Dockerfile
    restart: unless-stopped
    env_file: .env
    environment:
      MCP_PROXY_PORT: "8080"
    volumes:
      - ./logs/mcp-proxy:/app/logs
    networks:
      - pi_net
    depends_on:
      mongo:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://127.0.0.1:8080/health"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  mongo_data:
  redis_data:
  # 开发环境：local 驱动，数据在单机上。
  # 生产集群：用 docker-compose.prod.yml override，换为 NFS/EFS 驱动。
  sandbox_workspaces:

networks:
  pi_net:
    driver: bridge
